comments:
  DeprecatedBlockTag:
    active: true
  KDocReferencesNonPublicProperty:
    active: true
  OutdatedDocumentation:
    active: true
    allowParamOnConstructorProperties: true
complexity:
  LongParameterList:
    active: false
  NestedBlockDepth:
    active: false
  TooManyFunctions:
    active: false
style:
  ForbiddenComment:
    comments:
      - reason: 'FIXME comments are not actionable; fix the issue or track it externally.'
        value: 'FIXME'
      - reason: 'HACK comments hide design debt; explain the constraint or reference an issue.'
        value: 'HACK'
      - reason: 'STOPSHIP markers must be resolved before code is committed.'
        value: 'STOPSHIP'
      - reason: 'TODO comments belong in the issue tracker, not in source code.'
        value: 'TODO'
    allowedPatterns: ''
  MaxLineLength:
    maxLineLength: 300
  ReturnCount:
    active: false
  UseCheckOrError:
    active: false
  UnusedPrivateMember:
    active: false
  ProtectedMemberInFinalClass:
    active: false
  MagicNumber:
    active: false
  UnnecessaryAbstractClass:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  WildcardImport:
    excludeImports:
      - java.util.*
      - org.assertj.core.api.Assertions.*
naming:
  MemberNameEqualsClassName:
    active: false
  MatchingDeclarationName:
    active: false
exceptions:
  SwallowedException:
    active: false
  ThrowingExceptionsWithoutMessageOrCause:
    active: false
performance:
  SpreadOperator:
    active: false
formatting:
  NoWildcardImports:
    packagesToUseImportOnDemandProperty: "java.util.*,org.assertj.core.api.Assertions.*"
  MaximumLineLength:
    active: false
  Filename:
    active: false
