name: ${WOW_BENCHMARK_REDIS_PROJECT_NAME:-wow-benchmarks-redis}

services:
  redis:
    image: ${WOW_BENCHMARK_REDIS_IMAGE:-redis:7.4.9-alpine}
    container_name: ${WOW_BENCHMARK_REDIS_CONTAINER_NAME:-wow-benchmark-redis}
    restart: unless-stopped
    ports:
      - "${WOW_BENCHMARK_REDIS_HOST_PORT:-6379}:6379"
    logging:
      driver: local
      options:
        max-size: ${WOW_BENCHMARK_DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${WOW_BENCHMARK_DOCKER_LOG_MAX_FILE:-2}"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    tmpfs:
      - /data:rw,noexec,nosuid,size=${WOW_BENCHMARK_REDIS_DATA_TMPFS_SIZE:-1024m}
    sysctls:
      net.core.somaxconn: "1024"
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: ${WOW_BENCHMARK_REDIS_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${WOW_BENCHMARK_REDIS_HEALTHCHECK_TIMEOUT:-3s}
      retries: ${WOW_BENCHMARK_REDIS_HEALTHCHECK_RETRIES:-20}
      start_period: ${WOW_BENCHMARK_REDIS_HEALTHCHECK_START_PERIOD:-10s}
      start_interval: ${WOW_BENCHMARK_REDIS_HEALTHCHECK_START_INTERVAL:-2s}
