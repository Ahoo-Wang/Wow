name: ${WOW_BENCHMARK_REDIS_PROJECT_NAME:-wow-benchmarks-redis}

services:
  redis:
    image: ${WOW_BENCHMARK_REDIS_IMAGE:-redis:7.4.9-alpine}
    container_name: ${WOW_BENCHMARK_REDIS_CONTAINER_NAME:-wow-benchmark-redis}
    restart: unless-stopped
    ports:
      - "${WOW_BENCHMARK_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    tmpfs:
      - /data:rw,noexec,nosuid,size=${WOW_BENCHMARK_REDIS_DATA_TMPFS_SIZE:-1024m}
    sysctls:
      net.core.somaxconn: "1024"
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
