name: ${WOW_BENCHMARK_MONGO_PROJECT_NAME:-wow-benchmarks-mongo}

services:
  mongo:
    image: ${WOW_BENCHMARK_MONGO_IMAGE:-mongo:8.3.4}
    container_name: ${WOW_BENCHMARK_MONGO_CONTAINER_NAME:-wow-benchmark-mongo}
    restart: unless-stopped
    ports:
      - "${WOW_BENCHMARK_MONGO_HOST_PORT:-27017}:27017"
    logging:
      driver: local
      options:
        max-size: ${WOW_BENCHMARK_DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${WOW_BENCHMARK_DOCKER_LOG_MAX_FILE:-2}"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${WOW_BENCHMARK_MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${WOW_BENCHMARK_MONGO_ROOT_PASSWORD:-root}
    tmpfs:
      - /data/db:rw,noexec,nosuid,size=${WOW_BENCHMARK_MONGO_DATA_TMPFS_SIZE:-4096m}
      - /data/configdb:rw,noexec,nosuid,size=${WOW_BENCHMARK_MONGO_CONFIGDB_TMPFS_SIZE:-512m}
    command:
      - mongod
      - --auth
      - --bind_ip_all
      - --wiredTigerCacheSizeGB
      - "${WOW_BENCHMARK_MONGO_WIREDTIGER_CACHE_GB:-2}"
      - --wiredTigerCollectionBlockCompressor
      - none
      - --wiredTigerJournalCompressor
      - none
      - --setParameter
      - diagnosticDataCollectionEnabled=false
      - --setParameter
      - ttlMonitorEnabled=false
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD"
          --authenticationDatabase admin
          --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1
      interval: ${WOW_BENCHMARK_MONGO_HEALTHCHECK_INTERVAL:-60s}
      timeout: ${WOW_BENCHMARK_MONGO_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${WOW_BENCHMARK_MONGO_HEALTHCHECK_RETRIES:-30}
      start_period: ${WOW_BENCHMARK_MONGO_HEALTHCHECK_START_PERIOD:-15s}
      start_interval: ${WOW_BENCHMARK_MONGO_HEALTHCHECK_START_INTERVAL:-2s}
