name: Local Test
on:
  pull_request:
    paths:
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradle/**'
      - 'config/**'
      - 'wow-*/**'
      - 'test/**'
      - 'example/**'
      - 'compensation/wow-compensation-api/**'
      - 'compensation/wow-compensation-core/**'
      - 'compensation/wow-compensation-domain/**'
      - 'compensation/wow-compensation-server/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  id-token: write
env:
  CI: GITHUB_ACTIONS

jobs:
  local-test:
    name: Local Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          cache: gradle
          settings-path: ${{ github.workspace }}

      - name: Run local tests with coverage
        run: ./gradlew allLocalTest :code-coverage-report:localCoverageReport --stacktrace

      - name: Upload local coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          use_oidc: true
          flags: local
          name: local-tests
          fail_ci_if_error: true
          verbose: true
          disable_search: true
          files: ./test/code-coverage-report/build/reports/jacoco/localCoverageReport/localCoverageReport.xml
