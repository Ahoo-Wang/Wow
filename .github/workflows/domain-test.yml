name: Domain Test
on:
  pull_request:
    paths:
      - '.github/workflows/domain-test.yml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradle/**'
      - 'config/**'
      - 'wow-dependencies/**'
      - 'wow-api/**'
      - 'wow-core/**'
      - 'wow-spring/**'
      - 'wow-compiler/**'
      - 'test/wow-test/**'
      - 'example/**'
      - 'compensation/wow-compensation-api/**'
      - 'compensation/wow-compensation-domain/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  CI: GITHUB_ACTIONS

jobs:
  domain-test:
    name: Domain Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          cache: gradle
          settings-path: ${{ github.workspace }}

      - name: Run domain tests
        run: ./gradlew allDomainTest --stacktrace
