name: Contract Test
on:
  pull_request:
    paths:
      - '.github/workflows/contract-test.yml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradle/**'
      - 'config/**'
      - 'wow-dependencies/**'
      - 'wow-api/**'
      - 'wow-core/**'
      - 'wow-query/**'
      - 'wow-opentelemetry/**'
      - 'test/wow-tck/**'
      - 'test/wow-test/**'
      - 'test/wow-mock/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
env:
  CI: GITHUB_ACTIONS

jobs:
  contract-test:
    name: Contract Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          cache: gradle
          settings-path: ${{ github.workspace }}

      - name: Run contract tests with coverage
        run: ./gradlew allContractTest :code-coverage-report:contractCoverageReport --stacktrace

      - name: Upload contract coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: contract
          name: contract-tests
          fail_ci_if_error: true
          verbose: true
          disable_search: true
          files: ./test/code-coverage-report/build/reports/jacoco/contractCoverageReport/contractCoverageReport.xml
