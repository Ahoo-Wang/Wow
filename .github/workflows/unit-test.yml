name: Unit Test
on:
  pull_request:
    paths:
      - '.github/workflows/unit-test.yml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradle/**'
      - 'config/**'
      - 'wow-*/**'
      - 'test/**'
      - 'example/**'
      - 'compensation/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
env:
  CI: GITHUB_ACTIONS

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          cache: gradle
          settings-path: ${{ github.workspace }}

      - name: Run unit tests with coverage
        run: ./gradlew allUnitTest :code-coverage-report:unitCoverageReport --stacktrace

      - name: Upload unit coverage
        uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          name: unit-tests
          fail_ci_if_error: true
          verbose: true
          disable_search: true
          files: ./test/code-coverage-report/build/reports/jacoco/unitCoverageReport/unitCoverageReport.xml
