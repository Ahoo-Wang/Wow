name: Codecov
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'document/**'
      - 'documentation/**'
      - 'schema/**'
      - 'wow-example/**'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
  id-token: write
env:
  CI: GITHUB_ACTIONS
jobs:
  codecov:
    name: Codecov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          cache: gradle
          settings-path: ${{ github.workspace }}

      - name: Build Code Coverage Report
        run: ./gradlew codeCoverageReport --stacktrace

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.24.0
        if: always()
        with:
          comment_mode: off
          ignore_runs: true
          large_files: true
          files: |
            **/build/test-results/test/**/*.xml
            **/build/test-results/contractTest/**/*.xml
            **/build/test-results/integrationTest/**/*.xml

      - name: Upload Code Coverage Report to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          flags: full
          name: full-coverage
          fail_ci_if_error: true
          verbose: true
          disable_search: true
          files: ./test/code-coverage-report/build/reports/jacoco/codeCoverageReport/codeCoverageReport.xml
